{% extends "base.html" %}

{% block auth_content %}
<div class="row min-vh-100 align-items-center justify-content-center m-0">
    <div class="col-md-5 col-lg-4 col-xl-3">
        <div class="text-center mb-5">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Gharana Gold Logo"
                class="rounded-circle mx-auto shadow-lg border border-3 border-white mb-4"
                style="width: 140px; height: 140px; object-fit: cover; background: white; display: block;">
            <h2 class="fw-bold text-dark">Gharana Gold</h2>
            <p class="text-muted">Enterprise Resources Control</p>
        </div>

        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-5">
                <h4 class="fw-bold mb-4 text-center">System Login</h4>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">User Identity</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i
                                    class="fas fa-user text-muted small"></i></span>
                            <input type="text" class="form-control bg-light border-0" name="username"
                                placeholder="Username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Secure Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i
                                    class="fas fa-lock text-muted small"></i></span>
                            <input type="password" class="form-control bg-light border-0" name="password"
                                placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="mb-4 d-flex justify-content-between">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label small text-muted" for="remember">Keep me active</label>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-3 fw-bold shadow-sm rounded-3">
                            Authenticate Access<i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-5">
            <p class="text-muted small">&copy; 2026 Gharana Gold Ltd.<br>Premium Spices & Pure Products</p>
        </div>
    </div>
</div>

<style>
    body {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        min-height: 100vh;
    }

    .rounded-4 {
        border-radius: 1.5rem !important;
    }
</style>
{% endblock %}
