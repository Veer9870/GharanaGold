{% extends "base.html" %}

{% block content %}
<div class="dashboard-header mb-4">
    <div class="dashboard-title">
        <h2 class="fw-bold"><i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Record Vendor Bill</h2>
        <p class="text-muted mb-0">Step 5: Link the physical invoice from {{ order.vendor.name }} to PO #PO-{{
            "%05d"|format(order.id) }}</p>
    </div>
    <div class="dashboard-actions">
        <a href="{{ url_for('purchase.view_order', id=order.id) }}" class="btn btn-outline-secondary shadow-sm">
            <i class="fas fa-arrow-left me-2"></i>Back to PO
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-xl-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3 border-bottom">
                <h5 class="mb-0 fw-bold">Invoice Details</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-600">Vendor Invoice Number</label>
                            <input type="text" class="form-control" name="invoice_number" placeholder="Ex: INV/2026/001"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-600">Invoice Date</label>
                            <input type="date" class="form-control" name="invoice_date" required>
                        </div>

                        <div class="col-12">
                            <hr class="my-2">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-600">PO Grand Total</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">₹</span>
                                <input type="text" class="form-control bg-light" value="{{ "
                                    {:,.2f}".format(order.grand_total) }}" readonly>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-600">Bill Amount (Actual)</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" class="form-control fw-bold text-primary"
                                    name="total_amount" value="{{ order.grand_total }}" required>
                            </div>
                            <div class="form-text">Update if different from PO (charges, etc.)</div>
                        </div>

                        <div class="col-12 mt-4 pt-3 border-top text-end">
                            <button type="submit" class="btn btn-primary px-5 py-2 shadow-sm rounded-pill">
                                <i class="fas fa-save me-2"></i>SAVE BILL & UPDATE LEDGER
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .fw-600 {
        font-weight: 600;
        color: #5a5c69;
    }
</style>
{% endblock %}
